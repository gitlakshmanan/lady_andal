<!-- This is dashboard code on index.html -->

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lady Andal ERP - Login</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            }

            .login-card {
                border-radius: 1rem;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
                overflow: hidden;
                animation: slideUp 0.5s ease;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .login-header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                padding: 2rem;
                text-align: center;
                color: white;
            }

            .login-header i {
                font-size: 3rem;
                margin-bottom: 1rem;
            }

            .login-body {
                padding: 2rem;
                background: white;
            }

            .form-control:focus {
                border-color: #667eea;
                box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            }

            .btn-login {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border: none;
                padding: 0.75rem;
                font-weight: 600;
                transition: transform 0.2s;
            }

            .btn-login:hover {
                transform: translateY(-2px);
                background: linear-gradient(135deg, #5a67d8 0%, #6b46a0 100%);
            }

            .alert {
                animation: shake 0.5s ease;
            }

            @keyframes shake {
                0%,
                100% {
                    transform: translateX(0);
                }
                25% {
                    transform: translateX(-10px);
                }
                75% {
                    transform: translateX(10px);
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="login-card">
                        <div class="login-header">
                            <i class="bi bi-building"></i>
                            <h2>Lady Andal ERP</h2>
                            <p class="mb-0">Enterprise Resource Planning</p>
                        </div>
                        <div class="login-body">
                            <div id="alertMessage"></div>

                            <form id="loginForm">
                                <div class="mb-3">
                                    <label for="username" class="form-label">
                                        <i class="bi bi-person"></i> Username or
                                        Email
                                    </label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="username"
                                        placeholder="Enter username or email"
                                        required
                                    />
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        <i class="bi bi-lock"></i> Password
                                    </label>
                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        placeholder="Enter password"
                                        required
                                    />
                                </div>
                                <div class="mb-3 form-check">
                                    <input
                                        type="checkbox"
                                        class="form-check-input"
                                        id="rememberMe"
                                    />
                                    <label
                                        class="form-check-label"
                                        for="rememberMe"
                                        >Remember me</label
                                    >
                                </div>
                                <button
                                    type="submit"
                                    class="btn btn-primary btn-login w-100"
                                    id="loginBtn"
                                >
                                    <i class="bi bi-box-arrow-in-right"></i>
                                    Login
                                </button>
                            </form>

                            <hr class="my-4" />

                            <div class="text-center">
                                <small class="text-muted">
                                    <i class="bi bi-info-circle"></i> Demo:
                                    admin@example.com / admin123
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="js/api.js"></script>
        <script src="js/auth.js"></script>
        <script>
            // Check if already logged in
            if (localStorage.getItem("token")) {
                window.location.href = "dashboard.html";
            }

            // Login form handler
            document
                .getElementById("loginForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();

                    const username = document.getElementById("username").value;
                    const password = document.getElementById("password").value;
                    const rememberMe =
                        document.getElementById("rememberMe").checked;
                    const loginBtn = document.getElementById("loginBtn");

                    // Show loading state
                    loginBtn.disabled = true;
                    loginBtn.innerHTML =
                        '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

                    try {
                        const response = await login(username, password);
                        if (response.access_token) {
                            localStorage.setItem(
                                "token",
                                response.access_token,
                            );
                            if (rememberMe) {
                                localStorage.setItem("rememberMe", "true");
                            }
                            showAlert(
                                "Login successful! Redirecting...",
                                "success",
                            );
                            setTimeout(() => {
                                window.location.href = "dashboard.html";
                            }, 1000);
                        }
                    } catch (error) {
                        showAlert(
                            error.message ||
                                "Login failed. Please check your credentials.",
                            "danger",
                        );
                        loginBtn.disabled = false;
                        loginBtn.innerHTML =
                            '<i class="bi bi-box-arrow-in-right"></i> Login';
                    }
                });

            function showAlert(message, type) {
                const alertDiv = document.getElementById("alertMessage");
                alertDiv.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi bi-${type === "success" ? "check-circle" : "exclamation-triangle"} me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;

                if (type === "success") {
                    setTimeout(() => {
                        const alert = alertDiv.querySelector(".alert");
                        if (alert) alert.classList.remove("show");
                    }, 3000);
                }
            }
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
