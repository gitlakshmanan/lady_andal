<!-- This file is the demands page -->

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Demands - Lady Andal ERP</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <!-- Sidebar (same as index.html) -->
                <nav
                    class="col-md-3 col-lg-2 d-md-block bg-dark sidebar vh-100"
                >
                    <!-- Same sidebar code -->
                </nav>

                <!-- Main content -->
                <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                    <div
                        class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom"
                    >
                        <div class="d-flex align-items-center gap-2">
                            <a href="dashboard.html" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Back
                            </a>
                            <h1 class="h2 mb-0">Demands</h1>
                        </div>
                        <button
                            class="btn btn-primary"
                            data-bs-toggle="modal"
                            data-bs-target="#createDemandModal"
                        >
                            <i class="bi bi-plus-circle"></i> Create Demand
                        </button>
                    </div>

                    <!-- Tabs -->
                    <ul class="nav nav-tabs mb-3">
                        <li class="nav-item">
                            <a
                                class="nav-link active"
                                data-bs-toggle="tab"
                                href="#myDemands"
                                >My Demands</a
                            >
                        </li>
                        <li class="nav-item">
                            <a
                                class="nav-link"
                                data-bs-toggle="tab"
                                href="#pendingApprovals"
                                >Pending Approvals</a
                            >
                        </li>
                    </ul>

                    <div class="tab-content">
                        <!-- My Demands Tab -->
                        <div class="tab-pane fade show active" id="myDemands">
                            <div class="card">
                                <div class="card-body">
                                    <div class="table-responsive">
                                        <table class="table" id="demandsTable">
                                            <thead>
                                                <tr>
                                                    <th>Demand #</th>
                                                    <th>Date</th>
                                                    <th>Status</th>
                                                    <th>Total Qty</th>
                                                    <th>Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody id="demandsBody">
                                                <tr>
                                                    <td
                                                        colspan="5"
                                                        class="text-center"
                                                    >
                                                        Loading...
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Pending Approvals Tab -->
                        <div class="tab-pane fade" id="pendingApprovals">
                            <div class="card">
                                <div class="card-body">
                                    <div class="table-responsive">
                                        <table class="table" id="pendingTable">
                                            <thead>
                                                <tr>
                                                    <th>Demand #</th>
                                                    <th>Requestor</th>
                                                    <th>Date</th>
                                                    <th>Total Qty</th>
                                                    <th>Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody id="pendingBody">
                                                <tr>
                                                    <td
                                                        colspan="5"
                                                        class="text-center"
                                                    >
                                                        Loading...
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <!-- Create Demand Modal -->
        <div class="modal fade" id="createDemandModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Create New Demand</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <form id="demandForm">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Location</label>
                                    <select
                                        class="form-select"
                                        id="locationId"
                                        required
                                    >
                                        <option value="1">
                                            Chennai - Nungambakkam
                                        </option>
                                        <option value="2">
                                            Chennai - Tambaram
                                        </option>
                                        <option value="3">
                                            Coimbatore - RS Puram
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Department</label>
                                    <select
                                        class="form-select"
                                        id="departmentId"
                                        required
                                    >
                                        <option value="1">
                                            Administration
                                        </option>
                                        <option value="2">Academics</option>
                                        <option value="3">Operations</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Priority</label>
                                    <select class="form-select" id="priority">
                                        <option value="NORMAL">Normal</option>
                                        <option value="HIGH">High</option>
                                        <option value="URGENT">Urgent</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label"
                                        >Required By</label
                                    >
                                    <input
                                        type="date"
                                        class="form-control"
                                        id="requiredByDate"
                                    />
                                </div>
                            </div>

                            <h6>Items</h6>
                            <div id="itemsContainer">
                                <div class="row mb-2 item-row">
                                    <div class="col-md-8">
                                        <select
                                            class="form-select product-select"
                                            required
                                        >
                                            <option value="">
                                                Select Product
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <input
                                            type="number"
                                            class="form-control quantity"
                                            placeholder="Quantity"
                                            required
                                        />
                                    </div>
                                    <div class="col-md-1">
                                        <button
                                            type="button"
                                            class="btn btn-danger remove-item"
                                        >
                                            ×
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <button
                                type="button"
                                class="btn btn-secondary btn-sm"
                                id="addItemBtn"
                            >
                                + Add Item
                            </button>

                            <div class="mt-3">
                                <label class="form-label">Remarks</label>
                                <textarea
                                    class="form-control"
                                    id="remarks"
                                    rows="2"
                                ></textarea>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Cancel
                        </button>
                        <button
                            type="button"
                            class="btn btn-primary"
                            id="submitDemandBtn"
                        >
                            Submit Demand
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script src="js/api.js"></script>
        <script src="js/auth.js"></script>
        <script src="js/demands.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
